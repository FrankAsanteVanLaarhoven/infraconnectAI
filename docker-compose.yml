version: "3.9"

services:
  app:
    container_name: infraconnect-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@nexus-db:5432/nexus
      REDIS_URL: redis://nexus-cache:6379
    depends_on:
      nexus-db:
        condition: service_healthy
      nexus-cache:
        condition: service_started
    networks:
      - humanoid-net

  nexus-db:
    image: postgres:15-alpine
    container_name: nexus-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexus
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - humanoid-net

  nexus-cache:
    image: redis:7-alpine
    container_name: nexus-cache
    command: ["redis-server", "--appendonly", "yes"]
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - humanoid-net

  simulator:
    container_name: nexus-simulator
    image: alpine:latest
    command: ["tail", "-f", "/dev/null"]
    restart: always
    depends_on:
      - nexus-cache
    environment:
      REDIS_URL: redis://nexus-cache:6379
    networks:
      - humanoid-net

networks:
  humanoid-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
