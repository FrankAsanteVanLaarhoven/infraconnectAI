server {
    listen 80;
    server_name infraconnect.ai www.infraconnect.ai;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name infraconnect.ai www.infraconnect.ai;

    # SSL Configuration (Update paths with let's encrypt later)
    ssl_certificate /etc/letsencrypt/live/infraconnect.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infraconnect.ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # WebSocket / API Rate Limiting Setup
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Strict limit on lead queue to prevent spam
    location /api/leads {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:3006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
