<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="100%" fill="none">
  <defs>
    <!-- Metallic Gradient -->
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E6EDF3" />
      <stop offset="50%" stop-color="#AAB4BE" />
      <stop offset="100%" stop-color="#6B7280" />
    </linearGradient>

    <!-- Combined Filter: Inner Shadow + Outer Glow -->
    <filter id="hero-fx" x="-20%" y="-20%" width="140%" height="140%">
      <!-- 1. Outer Glow -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1" />
      <feFlood flood-color="#3B82F6" flood-opacity="0.25" result="glowColor" />
      <feComposite in="glowColor" in2="blur1" operator="in" result="glow" />

      <!-- 2. Inner Shadow Prep -->
      <!-- Create an offset alpha mask -->
      <feOffset in="SourceAlpha" dx="0" dy="3" result="offsetAlpha" />
      <feGaussianBlur in="offsetAlpha" stdDeviation="2" result="blurAlpha" />
      <!-- Subtract the blurred offset alpha from the original alpha to get the inner shadow area -->
      <feComposite operator="out" in="SourceAlpha" in2="blurAlpha" result="innerShadowMask" />
      <!-- Fill that area with dark color -->
      <feFlood flood-color="#000000" flood-opacity="0.6" result="shadowColor" />
      <feComposite operator="in" in="shadowColor" in2="innerShadowMask" result="innerShadow" />
      
      <!-- Merge all passes -->
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
        <feMergeNode in="innerShadow" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background transparent -->
  <rect width="100%" height="100%" fill="transparent" />

  <text 
    x="400" 
    y="72" 
    text-anchor="middle" 
    dominant-baseline="middle" 
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
    font-weight="800" 
    font-size="64" 
    letter-spacing="10" 
    fill="url(#metal)" 
    stroke="rgba(0,0,0,0.35)" 
    stroke-width="1.5" 
    filter="url(#hero-fx)"
  >INFRACONNECT</text>
  
  <!-- Subtle reflection line on the top 1/3 -->
  <path d="M 0 0 L 800 0 L 800 45 L 0 45 Z" fill="rgba(255,255,255,0.05)" />
</svg>
