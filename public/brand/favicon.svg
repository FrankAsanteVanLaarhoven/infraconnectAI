    <path 
       d="M 40 25 L 40 75 M 60 30 L 75 50 L 60 70" 
       fill="none"
       stroke="url(#metal)" 
       stroke-width="7"
       stroke-linecap="round"
       stroke-linejoin="round"
    />
    <path 
       d="M 0 65 C 25 30, 75 70, 100 35" 
       fill="none"
       stroke="#3B82F6" 
       stroke-width="6" 
       stroke-linecap="round"
    />
    <path d="M 0 65 C 25 30, 75 70, 100 35" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.8" />
  </g>
</svg>
