version: '3.8'

services:
  grok_demo_db:
    image: postgres:15-alpine
    container_name: grok_demo_db
    environment:
      POSTGRES_USER: grokadmin
      POSTGRES_PASSWORD: grokpassword
      POSTGRES_DB: demo
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: postgres -c wal_level=logical
