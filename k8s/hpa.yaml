apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: isaac-lab-hpa
  namespace: physical-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: isaac-lab
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
