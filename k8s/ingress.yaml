apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vla-workbench-ingress
  namespace: physical-ai
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
  - host: vla.infraconnect.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: isaac-lab-service
            port:
              number: 8888
  tls:
  - hosts:
    - vla.infraconnect.ai
    secretName: vla-tls-secret
